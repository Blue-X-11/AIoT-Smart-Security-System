services:

  api:
    build: .
    container_name: ai-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - torch_cache:/root/.cache/torch  # 新增：持久化模型权重
    environment:  # <--- 新增这部分
      - YOLO_CONFIG_DIR=/tmp  # 明确告诉 YOLO 配置文件放这里
      - MINIO_ENDPOINT=minio:9000      # 新增：告诉 FastAPI MinIO 的内网地址
      - MINIO_ROOT_USER=admin          # 新增
      - MINIO_ROOT_PASSWORD=password123 # 新增
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_started
      postgres: 
        condition: service_healthy  # 修改：等待 DB 真正就绪
      minio:
        condition: service_started


  redis:
    image: redis:7-alpine
    container_name: redis-server
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: postgres-db

    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aipassword
      POSTGRES_DB: aidb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:  # 新增健康检查
      test: ["CMD-SHELL", "pg_isready -U aiuser -d aidb"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio-server
    ports:
      - "9000:9000"  # API 接口端口（代码调用）
      - "9001:9001"  # Web 控制台端口（人类访问）
    environment:
      MINIO_ROOT_USER: admin           # 超级管理员账号
      MINIO_ROOT_PASSWORD: password123 # 超级管理员密码（至少8位）
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  celery_worker:
    build: .
    container_name: celery-worker
    # 和 API 挂载同一个目录，这样前台存的 temp_path 后厨才能找到！
    volumes:
      - .:/app
      - torch_cache:/root/.cache/torch
    # 环境变量必须和 api 保持一致，它也需要知道数据库和 MinIO 在哪
    environment:
      - YOLO_CONFIG_DIR=/tmp
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
      - REDIS_HOST=redis-server
      - REDIS_PORT=6379
      # 如果你有配 DATABASE_URL 在 .env 里，Docker 会自动读取，保险起见可以显式加上：
      - DATABASE_URL=postgresql://aiuser:aipassword@postgres-db:5432/aidb
    # 启动命令：启动一个工人，盯着 ai_tasks 这个应用
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    ports:
      - "80:80"  # 这是整个系统对外界暴露的唯一业务端口！
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - minio


volumes:
  postgres_data:
  torch_cache:
  minio_data: